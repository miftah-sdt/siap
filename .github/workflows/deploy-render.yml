name: Deploy to Render

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API URL (wajib jika secret belum di-set), contoh https://siap-api.onrender.com/v1'
        required: false
        type: string

concurrency:
  group: deploy-render
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build Web + APK → gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve API URL
        id: api
        env:
          INPUT_URL: ${{ github.event.inputs.api_base_url }}
          SECRET_URL: ${{ secrets.SIAP_API_URL }}
        run: |
          RAW_URL="${INPUT_URL:-$SECRET_URL}"
          RAW_URL="$(echo "$RAW_URL" | sed 's/[[:space:]]//g' | sed 's#/$##')"

          if [ -z "$RAW_URL" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error::Isi input 'api_base_url' ATAU set secret SIAP_API_URL di repo Settings → Secrets → Actions"
              exit 1
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Deploy dilewati — secret SIAP_API_URL belum di-set."
            echo "Langkah: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: SIAP_API_URL | Value: https://YOUR-API-HOST/v1"
            exit 0
          fi

          case "$RAW_URL" in
            http://*|https://*) ;;
            *)
              echo "::error::API URL harus diawali http:// atau https://"
              exit 1
              ;;
          esac

          if [ "${RAW_URL##*/}" != "v1" ]; then
            echo "::warning::API URL sebaiknya diakhiri /v1 (contoh: https://siap-api.onrender.com/v1)"
          fi

          echo "url=$RAW_URL" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Using API_BASE_URL=$RAW_URL"

      - name: Setup Java
        if: steps.api.outputs.skip != 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        if: steps.api.outputs.skip != 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.api.outputs.skip != 'true'
        run: flutter pub get

      - name: Build Web
        if: steps.api.outputs.skip != 'true'
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ steps.api.outputs.url }}

      - name: Build APK
        if: steps.api.outputs.skip != 'true'
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ steps.api.outputs.url }}

      - name: Package downloads
        if: steps.api.outputs.skip != 'true'
        run: |
          mkdir -p build/web/downloads
          cp build/app/outputs/flutter-apk/app-release.apk build/web/downloads/siap.apk
          cat > build/web/downloads/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="id">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Download SIAP APK</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 480px; margin: 4rem auto; padding: 0 1rem; }
              a { display: inline-block; margin-top: 1rem; padding: 0.75rem 1.5rem; background: #2e7d32; color: #fff; text-decoration: none; border-radius: 8px; }
            </style>
          </head>
          <body>
            <h1>SIAP — Android APK</h1>
            <p>Unduh aplikasi SIAP untuk Android (Nox / perangkat fisik).</p>
            <a href="./siap.apk" download>Download siap.apk</a>
          </body>
          </html>
          EOF

      - name: Deploy to gh-pages
        if: steps.api.outputs.skip != 'true'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: true
          single-commit: true

      - name: Upload APK artifact
        if: steps.api.outputs.skip != 'true'
        uses: actions/upload-artifact@v5
        with:
          name: siap-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
